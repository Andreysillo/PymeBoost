<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes — PymeBoost</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Outfit','sans-serif']}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#09090b;color:#fafafa;font-family:'Outfit',sans-serif;display:flex;height:100vh;overflow:hidden}
    .sidebar{width:220px;min-width:220px;background:#0d0d10;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;height:100vh}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;transition:all .15s;border:1px solid transparent}
    .nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.85)}
    .nav-item.active{background:rgba(124,58,237,0.15);color:#a78bfa;border-color:rgba(139,92,246,0.2)}
    .msg-workspace{flex:1;display:flex;min-width:0;overflow:hidden;background:#09090b}
    .conv-panel{width:320px;min-width:280px;max-width:360px;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;background:#0c0c0f}
    .conv-panel-header{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
    .conv-search{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;color:#fff;outline:none}
    .conv-search:focus{border-color:rgba(139,92,246,0.45);background:rgba(124,58,237,0.06)}
    .conv-search::placeholder{color:rgba(255,255,255,0.28)}
    #conv-list{flex:1;overflow-y:auto;padding:8px}
    .conv-item{display:flex;gap:12px;padding:12px;border-radius:12px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:background .15s,border-color .15s}
    .conv-item:hover{background:rgba(255,255,255,0.04)}
    .conv-item.active{background:rgba(124,58,237,0.12);border-color:rgba(139,92,246,0.25)}
    .conv-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
    .conv-meta{flex:1;min-width:0}
    .conv-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-project{font-size:11px;color:rgba(255,255,255,0.38);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .conv-preview{font-size:12px;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
    .conv-badge{min-width:20px;height:20px;border-radius:100px;background:#7c3aed;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px}
    .chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;color:rgba(255,255,255,0.35)}
    .chat-active{flex:1;display:flex;flex-direction:column;min-height:0}
    .chat-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:14px;flex-shrink:0;background:#09090b}
    .chat-header-avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
    #messages-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:4px;background:linear-gradient(180deg,#09090b 0%,#0a0a0e 100%)}
    .msg-row{display:flex;margin-bottom:8px}
    .msg-row.mine{justify-content:flex-end}
    .msg-row.theirs{justify-content:flex-start}
    .msg-bubble{max-width:min(520px,72%);padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
    .msg-bubble.mine{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-bottom-right-radius:4px}
    .msg-bubble.theirs{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);border-bottom-left-radius:4px}
    .msg-time{font-size:10px;color:rgba(255,255,255,0.28);margin-top:4px;padding:0 4px}
    .msg-time.mine{text-align:right}
    .date-sep{text-align:center;margin:16px 0 12px}
    .date-sep span{font-size:11px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);padding:4px 14px;border-radius:100px}
    .chat-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.07);background:#09090b;flex-shrink:0}
    .chat-input-wrap{display:flex;align-items:flex-end;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:10px 12px}
    .chat-input-wrap:focus-within{border-color:rgba(139,92,246,0.45)}
    #msg-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;font-family:inherit;color:#fff;resize:none;line-height:1.5;max-height:120px;min-height:22px}
    #msg-input::placeholder{color:rgba(255,255,255,0.28)}
    .btn-send{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s,transform .15s}
    .btn-send:disabled{opacity:0.4;cursor:not-allowed}
    .btn-send:not(:disabled):hover{transform:scale(1.04)}
    .btn-ghost{padding:8px 14px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.25);border-radius:8px}
  </style>
</head>
<body data-page="mensajes">

<aside class="sidebar" id="app-sidebar">
  <div style="padding:18px 14px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;">
    <div style="width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    </div>
    <div><div style="font-weight:700;font-size:14px;">PymeBoost</div><div style="font-size:10px;color:rgba(255,255,255,0.35);" id="panel-label">Panel PYME</div></div>
  </div>
  <nav style="flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;" id="app-nav"></nav>
  <div style="padding:12px;border-top:1px solid rgba(255,255,255,0.06);">
    <div style="display:flex;align-items:center;gap:10px;padding:8px;">
      <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;" id="user-initials">—</div>
      <div style="min-width:0;"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="user-name">Cargando...</div><div style="font-size:10px;color:rgba(255,255,255,0.35);" id="user-sub">—</div></div>
    </div>
  </div>
</aside>

<div class="msg-workspace">
  <aside class="conv-panel">
    <div class="conv-panel-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h1 style="font-size:16px;font-weight:800;margin:0;">Mensajes</h1>
        <span id="total-unread" style="display:none;font-size:11px;font-weight:700;background:#7c3aed;padding:2px 8px;border-radius:100px;"></span>
      </div>
      <div style="position:relative;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="conv-search" id="conv-search" placeholder="Buscar por nombre o proyecto...">
      </div>
    </div>
    <div id="conv-list"></div>
  </aside>

  <section class="chat-panel">
    <div class="chat-empty" id="chat-empty">
      <div style="width:64px;height:64px;border-radius:20px;background:rgba(124,58,237,0.12);border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:8px;">Selecciona una conversación</div>
      <p style="font-size:13px;max-width:280px;line-height:1.6;margin:0;">Elige un chat de la lista para ver el historial y coordinar tu proyecto con el asesor o la PYME.</p>
    </div>

    <div class="chat-active" id="chat-active" style="display:none;">
      <header class="chat-header">
        <div class="chat-header-avatar" id="chat-avatar">—</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:700;" id="chat-name">—</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="chat-sub">—</div>
        </div>
        <a href="Contratos.html" class="btn-ghost" id="chat-contract-link">Ver contrato</a>
      </header>
      <div id="messages-area"></div>
      <footer class="chat-footer">
        <div class="chat-input-wrap">
          <textarea id="msg-input" rows="1" placeholder="Escribe un mensaje..."></textarea>
          <button type="button" class="btn-send" id="send-btn" disabled title="Enviar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:8px;padding-left:4px;">Enter para enviar · Shift+Enter nueva línea</div>
      </footer>
    </div>
  </section>
</div>

<script src="js/api.js"></script>
<script src="js/app-shell.js"></script>
<script src="js/pages/mensajes.js"></script>
</body>
</html>
