<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PymeBoost — Gestión Inteligente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Tweaks panel */
    #tweaks-panel {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 264px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      z-index: 9999;
      padding: 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    #tweaks-panel.open { display: block; }
    .tweak-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; margin-top: 12px; }
    .tweak-label:first-child { margin-top: 0; }
    .color-swatches { display: flex; gap: 8px; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #0f172a; }
    .tweak-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; color: #0f172a; outline: none; }
    .tweak-input:focus { border-color: var(--primary-color, #7c3aed); box-shadow: 0 0 0 2px rgba(124,58,237,0.15); }
  </style>
  <!-- CSS variables for theming -->
  <style id="theme-vars">
    :root {
      --primary-color: #7c3aed;
      --primary-light: #ede9fe;
      --primary-text: #6d28d9;
      --primary-ring: rgba(124,58,237,0.2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Tweaks panel (vanilla) -->
  <div id="tweaks-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <span style="font-weight:700;font-size:14px;color:#0f172a;">Tweaks</span>
      <button onclick="closeTweaks()" style="background:none;border:none;cursor:pointer;padding:4px;color:#94a3b8;font-size:18px;line-height:1;">×</button>
    </div>
    <div class="tweak-label">Color principal</div>
    <div class="color-swatches" id="color-swatches">
      <div class="color-swatch active" data-color="#7c3aed" data-light="#ede9fe" style="background:#7c3aed;" title="Violet" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-color="#2563eb" data-light="#dbeafe" style="background:#2563eb;" title="Azul" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-color="#059669" data-light="#d1fae5" style="background:#059669;" title="Verde" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-color="#d97706" data-light="#fef3c7" style="background:#d97706;" title="Ámbar" onclick="setTheme(this)"></div>
      <div class="color-swatch" data-color="#e11d48" data-light="#ffe4e6" style="background:#e11d48;" title="Rosa" onclick="setTheme(this)"></div>
    </div>
    <div class="tweak-label">Nombre del negocio</div>
    <input class="tweak-input" id="company-name-input" value="Ferretería El Tornillo" oninput="setCompanyName(this.value)" placeholder="Nombre del negocio">
    <div class="tweak-label">Densidad</div>
    <div style="display:flex;gap:6px;">
      <button id="density-compact" onclick="setDensity('compact')" style="flex:1;padding:6px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#f8fafc;color:#64748b;">Compacto</button>
      <button id="density-normal" onclick="setDensity('normal')" style="flex:1;padding:6px;border:1px solid #7c3aed;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#ede9fe;color:#7c3aed;">Normal</button>
    </div>
  </div>

  <script>
    function closeTweaks() {
      document.getElementById('tweaks-panel').classList.remove('open');
      window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
    }
    function setTheme(el) {
      const color = el.dataset.color;
      const light = el.dataset.light;
      document.getElementById('theme-vars').textContent =
        ':root { --primary-color:' + color + '; --primary-light:' + light + '; --primary-text:' + color + '; --primary-ring: ' + color + '33; }';
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      window.__tweakColor = color;
      if (window.__setAppColor) window.__setAppColor(color, light);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { primaryColor: color } }, '*');
    }
    function setCompanyName(name) {
      if (window.__setCompanyName) window.__setCompanyName(name);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { companyName: name } }, '*');
    }
    function setDensity(d) {
      document.getElementById('density-compact').style.cssText = d === 'compact'
        ? 'flex:1;padding:6px;border:1px solid var(--primary-color);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:var(--primary-light);color:var(--primary-color);'
        : 'flex:1;padding:6px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#f8fafc;color:#64748b;';
      document.getElementById('density-normal').style.cssText = d === 'normal'
        ? 'flex:1;padding:6px;border:1px solid var(--primary-color);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:var(--primary-light);color:var(--primary-color);'
        : 'flex:1;padding:6px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#f8fafc;color:#64748b;';
      if (window.__setDensity) window.__setDensity(d);
    }
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').classList.add('open');
      }
      if (e.data && e.data.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').classList.remove('open');
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  </script>

  <script src="src/data.js"></script>
  <script type="text/babel" src="src/icons.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/charts.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/ui.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/layout.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/dashboard.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/ventas.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/inventario.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/clientes.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/reportes.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/app.jsx" data-presets="react"></script>
</body>
</html>
